services:
  - type: web
    name: twouple-api
    env: node
    plan: free
    region: singapore # Change this depending on where your users are based
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: twouple-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USE_REAL_OTP
        value: "false" # Keep false until you are ready for real SMS
      - key: TWILIO_ACCOUNT_SID
        sync: false # Set securely in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: twouple-db
    plan: free
    region: singapore
    databaseName: twouple
    user: twouple_user
